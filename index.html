<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MwahApp</title>
    <style>
        /* Style général adapté au téléphone */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            color: #fb6f92;
            margin-bottom: 5px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #ff8fab;
            margin-bottom: 40px;
            font-weight: bold;
        }

        /* Conteneur pour le cœur */
        .click-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Le Bouton Cœur */
        .heart-btn {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* L'animation quand on clique */
        .heart-btn:active {
            transform: scale(0.8);
        }

        /* Zone d'affichage du score */
        .score-container {
            margin-top: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.2);
            backdrop-filter: blur(5px);
        }

        .score-label {
            font-size: 1rem;
            color: #ff8fab;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #score {
            font-size: 3rem;
            font-weight: 900;
            color: #fb6f92;
            display: block;
        }

        /* Animation Popcorn pour les émojis et les textes */
        .mwah-particle {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            animation: popcorn 0.6s ease-out forwards;
            z-index: 10;
            white-space: nowrap;
        }

        /* Style spécifique pour le texte "Mwah !" quand il pop */
        .text-particle {
            font-size: 24px;
            font-weight: bold;
            color: #ff477e;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        @keyframes popcorn {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 1;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(1.2) rotate(var(--r));
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>Mwah Clicker</h1>
    <div class="subtitle"> :3 </div>

    <div class="click-container">
        <div class="heart-btn" id="heart">❤️</div>
    </div>

    <div class="score-container">
        <span class="score-label">Mwah envoyés</span>
        <span id="score">0</span>
    </div>

    <script>
        const heartBtn = document.getElementById('heart');
        const scoreDisplay = document.getElementById('score');
        const container = document.querySelector('.click-container');

        let score = parseInt(localStorage.getItem('mwahScore')) || 0;
        scoreDisplay.textContent = score;

        function triggerMwah(e) {
            score++;
            scoreDisplay.textContent = score;
            localStorage.setItem('mwahScore', score);

            createPopcornParticle();
        }

        function createPopcornParticle() {
            const particle = document.createElement('div');
            particle.classList.add('mwah-particle');

            // --- NOUVEAUTÉ : Choix aléatoire entre l'émoji et le texte ---
            // Math.random() donne un chiffre entre 0 et 1. 
            // Si c'est plus petit que 0.4 (40% de chance), on écrit "Mwah !", sinon on met l'émoji 💋.
            if (Math.random() < 0.4) {
                particle.textContent = 'Mwah !';
                particle.classList.add('text-particle'); // On applique le style du texte
            } else {
                particle.textContent = '💋';
            }

            // Trajectoires aléatoires style popcorn
            const randomX = (Math.random() - 0.5) * 180 + 'px';
            const randomY = -(Math.random() * 100 + 120) + 'px';
            const randomRotate = (Math.random() - 0.5) * 50 + 'deg';

            particle.style.setProperty('--x', randomX);
            particle.style.setProperty('--y', randomY);
            particle.style.setProperty('--r', randomRotate);

            // Centrage de départ sur le cœur (ajusté pour le texte)
            particle.style.left = '60px';
            particle.style.top = '80px';

            container.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 600);
        }

        heartBtn.addEventListener('click', triggerMwah);
    </script>
</body>
</html>
